<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <rect x="16" y="16" width="224" height="224" rx="48" fill="url(#cloudGrad)"/>
  
  <!-- 云朵主体 -->
  <g fill="white">
    <!-- 底部弧形 -->
    <ellipse cx="128" cy="165" rx="70" ry="35"/>
    <!-- 左侧圆 -->
    <circle cx="88" cy="130" r="40"/>
    <!-- 中间圆 -->
    <circle cx="128" cy="105" r="50"/>
    <!-- 右侧圆 -->
    <circle cx="168" cy="130" r="40"/>
  </g>
  
  <!-- 挂载符号 (向下箭头表示挂载) -->
  <g fill="#4A90E2">
    <rect x="118" y="140" width="20" height="40" rx="3"/>
    <polygon points="128,200 100,165 115,165 115,175 141,175 141,165 156,165"/>
  </g>
  
  <!-- 挂载线 (云下方的连接点) -->
  <g stroke="white" stroke-width="4" stroke-linecap="round">
    <line x1="80" y1="200" x2="80" y2="220"/>
    <line x1="128" y1="200" x2="128" y2="220"/>
    <line x1="176" y1="200" x2="176" y2="220"/>
  </g>
</svg>